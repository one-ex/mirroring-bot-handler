services:
  - type: web
    name: telegram-proxy
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_proxy.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: HF_SPACE_URL
        value: https://one-ex-mirror-bot.hf.space
    healthCheckPath: /health
