services:
  - type: web
    name: telegram-bot
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "./start.sh"
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
    # Tambahkan health check path
    healthCheckPath: /health
    # Atur interval health check
    healthCheckTimeout: 10
    healthCheckInterval: 30
    disk:
      name: data
      mountPath: /data
      sizeGB: 1