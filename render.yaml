services:
  - type: web
    name: telegram-mirror-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: MIRROR_API_URL
        value: https://your-username-mirroring-handler.hf.space/api/v1
      - key: BOT_CALLBACK_URL
        generateValue: true
    healthCheckPath: /health